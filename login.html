<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agrimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        agrigreen: '#406b03',
                        agrilight: '#6aaf08',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans smooth-scroll pt-32 flex flex-col min-h-screen">

    <!-- Header Section -->
    <header class="fixed top-0 w-full z-50 bg-white shadow-sm border-t-4 border-agrigreen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex flex-col">
                    <span class="text-3xl font-extrabold text-agrigreen flex items-center gap-2">
                        <i class="fa-solid fa-leaf"></i> AGRIMART
                    </span>
                    <span class="text-xs text-gray-500 font-semibold tracking-wide">Farm Equipment | Green Care | Services</span>
                </a>
                <div class="hidden md:flex flex-1 max-w-xl mx-8">
                    <div class="relative w-full">
                        <input type="text" placeholder="Search for Products, Category" class="w-full border-2 border-gray-300 rounded-l-md px-4 py-2 focus:outline-none focus:border-agrigreen">
                        <button class="absolute right-0 top-0 h-full bg-agrigreen text-white px-6 rounded-r-md hover:bg-green-800 transition">
                            <i class="fa-solid fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="login.html" class="flex items-center gap-2 cursor-pointer text-agrigreen transition">
                        <div class="bg-gray-100 p-3 rounded-full text-agrigreen"><i class="fa-solid fa-user"></i></div>
                        <div class="hidden sm:block">
                            <span class="text-sm text-gray-500 block">Account</span>
                            <span class="font-bold">Sign In</span>
                        </div>
                    </a>
                    <a href="cart.html" class="flex items-center gap-2 cursor-pointer hover:text-agrigreen transition">
                        <div class="bg-agrigreen p-3 rounded-full text-white relative">
                            <i class="fa-solid fa-shopping-cart"></i>
                            <span class="absolute -top-1 -right-1 bg-yellow-500 text-xs font-bold px-1.5 rounded-full border border-white">0</span>
                        </div>
                        <div class="hidden sm:block">
                            <span class="text-sm text-gray-500 block">My Cart</span>
                            <span class="font-bold text-agrigreen">₹ 0.00</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
        <nav class="bg-white border-t border-gray-200 shadow-sm hidden md:block">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-12">
                    <div class="flex items-center space-x-8 font-semibold text-sm">
                        <a href="index.html" class="text-gray-600 hover:text-agrigreen transition">Home</a>
                        <a href="products.html" class="text-gray-600 hover:text-agrigreen transition">Products</a>
                        <a href="about.html" class="text-gray-600 hover:text-agrigreen transition">About Us</a>
                        <a href="contact.html" class="text-gray-600 hover:text-agrigreen transition">Contact Us</a>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-phone text-agrigreen"></i>
                        <span class="text-gray-500">Missed Call Number:</span>
                        <span class="font-bold text-gray-800">7393 938 938</span>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-md mx-auto px-4 py-12 w-full">
        <div class="bg-white p-8 rounded-xl shadow-md border border-gray-200">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Welcome Back</h2>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-agrigreen focus:ring-1 focus:ring-agrigreen" placeholder="farmer@example.com">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-agrigreen focus:ring-1 focus:ring-agrigreen" placeholder="********">
                </div>
                <button type="submit" class="w-full bg-agrigreen text-white font-bold py-3 rounded-md hover:bg-green-800 transition">Sign In</button>
                <div id="loginError" class="text-red-500 text-sm mt-2 hidden"></div>
            </form>
            <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            localStorage.setItem('user', JSON.stringify(data));
                            window.location.href = 'index.html';
                        } else {
                            const errDiv = document.getElementById('loginError');
                            errDiv.textContent = data.error || 'Login failed';
                            errDiv.classList.remove('hidden');
                        }
                    } catch (err) {
                        console.error(err);
                    }
                });
            </script>
            <p class="mt-4 text-center text-sm text-gray-600">Don't have an account? <a href="register.html" class="text-agrigreen font-bold hover:underline">Register here</a></p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 class="text-2xl font-bold text-white mb-4">Agrimart - Your trusted agricultural partner</h2>
            <p>&copy; 2026 Agrimart. All rights reserved.</p>
        </div>
    </footer>
<script src="auth.js"></script>
</body>
</html>
