<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Agrimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        agrigreen: '#406b03',
                        agrilight: '#6aaf08',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans smooth-scroll pt-32 flex flex-col min-h-screen">

    <!-- Header Section -->
    <header class="fixed top-0 w-full z-50 bg-white shadow-sm border-t-4 border-agrigreen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex flex-col">
                    <span class="text-3xl font-extrabold text-agrigreen flex items-center gap-2">
                        <i class="fa-solid fa-leaf"></i> AGRIMART
                    </span>
                    <span class="text-xs text-gray-500 font-semibold tracking-wide">Farm Equipment | Green Care | Services</span>
                </a>
                <div class="hidden md:flex flex-1 max-w-xl mx-8">
                    <div class="relative w-full">
                        <input type="text" placeholder="Search for Products, Category" class="w-full border-2 border-gray-300 rounded-l-md px-4 py-2 focus:outline-none focus:border-agrigreen">
                        <button class="absolute right-0 top-0 h-full bg-agrigreen text-white px-6 rounded-r-md hover:bg-green-800 transition">
                            <i class="fa-solid fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="login.html" class="flex items-center gap-2 cursor-pointer hover:text-agrigreen transition">
                        <div class="bg-gray-100 p-3 rounded-full text-gray-600"><i class="fa-solid fa-user"></i></div>
                        <div class="hidden sm:block">
                            <span class="text-sm text-gray-500 block">Account</span>
                            <span class="font-bold">Sign In</span>
                        </div>
                    </a>
                    <a href="cart.html" class="flex items-center gap-2 cursor-pointer hover:text-agrigreen transition">
                        <div class="bg-agrigreen p-3 rounded-full text-white relative">
                            <i class="fa-solid fa-shopping-cart"></i>
                            <span class="absolute -top-1 -right-1 bg-yellow-500 text-xs font-bold px-1.5 rounded-full border border-white">0</span>
                        </div>
                        <div class="hidden sm:block">
                            <span class="text-sm text-gray-500 block">My Cart</span>
                            <span class="font-bold text-agrigreen">₹ 0.00</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
        <nav class="bg-white border-t border-gray-200 shadow-sm hidden md:block">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-12">
                    <div class="flex items-center space-x-8 font-semibold text-sm">
                        <a href="index.html" class="text-gray-600 hover:text-agrigreen transition">Home</a>
                        <a href="products.html" class="text-agrigreen border-b-2 border-agrigreen pb-3 pt-3">Products</a>
                        <a href="about.html" class="text-gray-600 hover:text-agrigreen transition">About Us</a>
                        <a href="contact.html" class="text-gray-600 hover:text-agrigreen transition">Contact Us</a>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-phone text-agrigreen"></i>
                        <span class="text-gray-500">Missed Call Number:</span>
                        <span class="font-bold text-gray-800">7393 938 938</span>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <h1 class="text-4xl font-bold text-gray-900 mb-8">All Products</h1>
        
        <!-- Loading Spinner -->
        <div id="loading" class="text-center py-10 text-gray-500">
            <i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i>
            <p>Loading catalog from SQLite database...</p>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            <!-- Dynamic Products will be injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 class="text-2xl font-bold text-white mb-4">Agrimart - Your trusted agricultural partner</h2>
            <p>&copy; 2026 Agrimart. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript to Fetch Products -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/products')
                .then(response => response.json())
                .then(products => {
                    const grid = document.getElementById('product-grid');
                    const loading = document.getElementById('loading');
                    
                    loading.style.display = 'none';
                    grid.innerHTML = ''; // Clear empty grid
                    
                    products.forEach(product => {
                        const card = `
                            <div class="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm hover:shadow-lg transition flex flex-col">
                                <div class="p-4 bg-white flex justify-center items-center h-48">
                                    <img src="${product.image_url}" alt="${product.name}" class="max-h-full max-w-full object-contain">
                                </div>
                                <div class="p-4 border-t border-gray-100 flex-1 flex flex-col">
                                    <h4 class="font-bold text-gray-800 leading-tight mb-2 flex-1 hover:text-agrigreen cursor-pointer">${product.name}</h4>
                                    <p class="text-xs text-gray-500 mb-3">RIPL Code: <span class="font-bold">${product.code}</span></p>
                                    <div class="mb-4">
                                        <span class="text-xs text-gray-500 block">MRP (Inclusive of all taxes)</span>
                                        <span class="text-xl font-bold text-agrigreen">₹ ${product.price.toFixed(2)}</span>
                                    </div>
                                    <a href="cart.html" class="block text-center w-full bg-agrigreen text-white font-bold py-2 rounded shadow-md hover:bg-green-800 transition">BUY NOW</a>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                })
                .catch(error => {
                    document.getElementById('loading').innerHTML = '<p class="text-red-500">Failed to load products. Is the server running?</p>';
                    console.error('Error fetching products:', error);
                });
        });
    </script>
<script src="auth.js"></script>
</body>
</html>
